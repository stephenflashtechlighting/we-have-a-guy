<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="We Have A Guy">
<meta name="theme-color" content="#1a1610">
<title>We Have A Guy</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --warm-white: #faf8f3;
    --ink: #1a1610;
    --brown: #5c3d2e;
    --gold: #c8973a;
    --gold-light: #e8c46a;
    --rust: #b85c38;
    --card-bg: #ffffff;
    --border: #ddd5c4;
    --shadow: rgba(92,61,46,0.12);
    --tag-bg: #f0e8d8;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    min-height: -webkit-fill-available;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--ink);
    padding: calc(16px + var(--safe-top)) 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.4);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--gold-light);
    line-height: 1;
  }

  .header-left p {
    color: #a89880;
    font-size: 0.72rem;
    font-weight: 300;
    margin-top: 3px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  .sync-indicator {
    font-size: 0.72rem;
    color: #7a6a58;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .sync-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #7a6a58;
    transition: background 0.3s;
  }

  .sync-dot.syncing { background: var(--gold); animation: pulse 1s infinite; }
  .sync-dot.ok      { background: #6db56d; }
  .sync-dot.error   { background: #e05a40; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .btn-add {
    background: var(--gold);
    color: var(--ink);
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 600;
    font-size: 0.88rem;
    cursor: pointer;
    transition: background 0.18s;
    white-space: nowrap;
  }

  .btn-add:hover { background: var(--gold-light); }

  .search-wrap {
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(200,151,58,0.3);
    color: #f5f0e8;
    padding: 9px 16px 9px 36px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: 'Source Sans 3', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input::placeholder { color: #6a5a48; }
  .search-wrap input:focus { border-color: var(--gold); }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: #6a5a48;
    font-size: 13px;
    pointer-events: none;
  }

  /* ─── FILTER BAR ─── */
  .filter-bar {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    overflow-x: auto;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    display: flex;
    gap: 7px;
    align-items: center;
  }

  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-chip {
    display: inline-block;
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: white;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Source Sans 3', sans-serif;
    color: #5a4a3a;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .filter-chip:hover { border-color: var(--gold); }
  .filter-chip.active { background: var(--gold); border-color: var(--gold); color: var(--ink); font-weight: 600; }

  /* ─── MAIN ─── */
  main {
    padding: 16px 16px calc(24px + var(--safe-bottom));
    max-width: 900px;
    margin: 0 auto;
  }

  .stats-row {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    font-size: 0.78rem;
    color: #8a7a6a;
    flex-wrap: wrap;
  }

  .stat-pill {
    background: white;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
  }

  .stat-pill strong { color: var(--brown); }

  /* ─── LOADING ─── */
  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    gap: 16px;
    color: #8a7a6a;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── CATEGORY SECTION ─── */
  .category-section { margin-bottom: 24px; }

  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    cursor: pointer;
    user-select: none;
  }

  .category-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    color: var(--brown);
    font-weight: 700;
  }

  .category-count {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 0.72rem;
    color: #7a6a58;
    font-weight: 600;
  }

  .category-line { flex: 1; height: 1px; background: var(--border); }
  .collapse-icon { color: #a89880; font-size: 0.7rem; transition: transform 0.2s; }
  .collapsed .collapse-icon { transform: rotate(-90deg); }

  /* ─── CARDS ─── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
  }

  .cards-grid.hidden { display: none; }

  .contact-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    position: relative;
    transition: box-shadow 0.18s, transform 0.15s;
  }

  .contact-card:hover { box-shadow: 0 4px 16px var(--shadow); transform: translateY(-1px); }

  .card-name {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--ink);
    margin-bottom: 5px;
    padding-right: 52px;
    line-height: 1.35;
  }

  .card-detail {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    font-size: 0.8rem;
    color: #6a5a4a;
    margin-top: 3px;
    line-height: 1.4;
  }

  .card-detail .icon { width: 13px; flex-shrink: 0; margin-top: 1px; color: var(--gold); }
  .card-detail a { color: var(--rust); text-decoration: none; }
  .card-detail a:hover { text-decoration: underline; }

  .card-notes {
    margin-top: 7px;
    padding-top: 7px;
    border-top: 1px dashed var(--border);
    font-size: 0.76rem;
    color: #8a7a6a;
    font-style: italic;
    line-height: 1.45;
  }

  .card-actions {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 4px;
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    width: 26px; height: 26px;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    transition: all 0.15s;
    color: #7a6a58;
  }

  .btn-icon:hover { border-color: var(--gold); color: var(--brown); background: var(--tag-bg); }
  .btn-icon.del:hover { border-color: #e05a40; color: #e05a40; background: #fff5f3; }

  /* ─── EMPTY ─── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #a89880;
  }

  .empty-state .big-icon { font-size: 2.5rem; margin-bottom: 10px; }

  /* ─── OFFLINE BANNER ─── */
  .offline-banner {
    background: #c04030;
    color: white;
    text-align: center;
    padding: 6px 16px;
    font-size: 0.78rem;
    font-weight: 600;
    display: none;
  }

  .offline-banner.show { display: block; }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,22,16,0.7);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(3px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--warm-white);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 560px;
    max-height: 92vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
    padding-bottom: var(--safe-bottom);
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 10px auto 0;
  }

  .modal-header {
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--brown);
  }

  .btn-close {
    background: none;
    border: none;
    font-size: 1.1rem;
    cursor: pointer;
    color: #a89880;
    padding: 4px;
  }

  .modal-body {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .form-group { display: flex; flex-direction: column; gap: 4px; }

  .form-group label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #8a7a6a;
    font-weight: 600;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    background: white;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(200,151,58,0.12); }
  .form-group textarea { resize: vertical; min-height: 70px; }

  .new-category-row { display: none; }
  .new-category-row.visible { display: flex; gap: 8px; }
  .new-category-row input { flex: 1; }

  .modal-footer {
    padding: 12px 20px 16px;
    display: flex;
    gap: 10px;
    border-top: 1px solid var(--border);
  }

  .btn-cancel {
    flex: 1;
    background: none;
    border: 1px solid var(--border);
    padding: 11px;
    border-radius: 8px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    color: #6a5a4a;
  }

  .btn-save {
    flex: 2;
    background: var(--gold);
    color: var(--ink);
    border: none;
    padding: 11px;
    border-radius: 8px;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.18s;
  }

  .btn-save:hover { background: var(--gold-light); }
  .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ─── CONFIRM ─── */
  .confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,22,16,0.7);
    z-index: 300;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .confirm-overlay.open { display: flex; }

  .confirm-box {
    background: white;
    border-radius: 12px;
    padding: 24px;
    max-width: 320px;
    width: 100%;
    text-align: center;
  }

  .confirm-box h3 { font-family: 'Playfair Display', serif; color: var(--brown); margin-bottom: 8px; }
  .confirm-box p  { font-size: 0.85rem; color: #6a5a4a; margin-bottom: 18px; line-height: 1.5; }
  .confirm-btns   { display: flex; gap: 10px; }
  .btn-confirm-del { flex: 1; background: #e05a40; color: white; border: none; padding: 11px; border-radius: 8px; cursor: pointer; font-family: 'Source Sans 3', sans-serif; font-weight: 600; font-size: 0.9rem; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: calc(20px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--ink);
    color: var(--gold-light);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    z-index: 400;
    transition: transform 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (min-width: 600px) {
    .modal { border-radius: 12px; margin: 20px; max-height: 85vh; }
    .modal-overlay { align-items: center; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
  }
</style>
</head>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzDCJSgvtuYKy3nYQDNHcPWNFNl_A0fMT72B-thI-1Bi8gvCrVfDwxUOSr1ktFMfv2dgw/exec";
</script>

<div class="offline-banner" id="offlineBanner">⚠️ You're offline — showing last loaded contacts</div>

<header>
  <div class="header-top">
    <div class="header-left">
      <h1>📋 We Have A Guy</h1>
      <p>Gordon family directory</p>
    </div>
    <div class="header-actions">

    <input type="search" id="searchInput" placeholder="Search contacts…" oninput="renderAll()">

<div class="filter-bar" id="filterBar">

</div>

      <div class="spinner"></div>

  <div class="empty-state" id="emptyState" style="display:none">
    <div class="big-icon">🔎</div>
    <p>No contacts match your search.</p>
  </div>
</main>

<!-- Add/Edit Modal -->

        <input type="text" id="f_name" placeholder="Full name or business">
      </div>
      <div class="form-group">
        <label>Category *</label>
        <select id="f_category" onchange="handleCategoryChange()">
          <option value="">— Select —</option>
        </select>
      </div>
      <div class="new-category-row" id="newCatRow">
        <input type="text" id="f_newcat" placeholder="New category name">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>

    </div>
  </div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let contacts = [];
let activeFilter = 'All';
let editingId = null;
let deletingId = null;

// ─── SYNC ────────────────────────────────────────────────────────────────────
function setSyncState(state, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = label;
}

async function apiCall(params) {
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify(params),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function loadContacts() {
  setSyncState('syncing', 'Loading…');
  try {
    const data = await apiCall({ action: 'getAll' });
    contacts = data.contacts;
    // Cache locally for offline
    localStorage.setItem('whag_cache', JSON.stringify(contacts));
    setSyncState('ok', 'Synced');
    renderAll();
  } catch (e) {
    // Try cache
    const cached = localStorage.getItem('whag_cache');
    if (cached) {
      contacts = JSON.parse(cached);
      setSyncState('error', 'Offline');
      document.getElementById('offlineBanner').classList.add('show');
      renderAll();
    } else {
      setSyncState('error', 'Error');
      document.getElementById('directory').innerHTML = `
        <div class="empty-state">
          <div class="big-icon">⚠️</div>
          <p>Couldn't load contacts.<br>Check your connection and refresh.</p>
        </div>`;
    }
  }
}

// ─── CATEGORIES ──────────────────────────────────────────────────────────────
function getCategories() {
  return [...new Set(contacts.map(c => c.category))].sort();
}

function buildFilterBar() {
  const cats = getCategories();
  const bar = document.getElementById('filterBar');
  bar.innerHTML = `<button class="filter-chip${activeFilter==='All'?' active':''}" onclick="setFilter('All',this)">All</button>` +
    cats.map(c => `<button class="filter-chip${activeFilter===c?' active':''}" onclick="setFilter('${escJsArg(c)}',this)">${c}</button>`).join('');
}

function setFilter(cat, el) {
  activeFilter = cat;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderAll();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderAll() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  buildFilterBar();

  const cats = getCategories();
  let html = '';
  let totalShown = 0;

  for (const cat of cats) {
    if (activeFilter !== 'All' && activeFilter !== cat) continue;
    let items = contacts.filter(c => c.category === cat);
    if (q) items = items.filter(c =>
      [c.name, c.phone, c.email, c.notes, c.address].some(v => v && v.toLowerCase().includes(q))
    );
    if (!items.length) continue;
    totalShown += items.length;

    html += `
      <div class="category-section" id="sec_${encodeId(cat)}">
        <div class="category-header" onclick="toggleSection('${escJsArg(cat)}')">
          <span class="category-title">${cat}</span>
          <span class="category-count">${items.length}</span>
          <span class="category-line"></span>
          <span class="collapse-icon">▼</span>
        </div>
        <div class="cards-grid" id="grid_${encodeId(cat)}">
          ${items.map(renderCard).join('')}
        </div>
      </div>`;
  }

  document.getElementById('directory').innerHTML = html || '';
  document.getElementById('emptyState').style.display = (totalShown === 0 && contacts.length > 0) ? 'block' : 'none';

  const stats = document.getElementById('statsRow');
  stats.innerHTML = `
    <span class="stat-pill"><strong>${contacts.length}</strong> contacts</span>
    <span class="stat-pill"><strong>${getCategories().length}</strong> categories</span>
    ${q ? `<span class="stat-pill">Showing <strong>${totalShown}</strong></span>` : ''}`;
}

function escJsArg(str) {
  return String(str ?? '')
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/\r/g, '')
    .replace(/\n/g, '\\n');
}

function encodeId(str) {
  return str.replace(/[^a-zA-Z0-9]/g, '_');
}

function renderCard(c) {
  const phone = c.phone ? `<div class="card-detail"><span class="icon">📞</span><a href="tel:${c.phone}">${c.phone}</a></div>` : '';
  const email = c.email ? `<div class="card-detail"><span class="icon">✉️</span><a href="mailto:${c.email}">${c.email}</a></div>` : '';
  const addr  = c.address ? `<div class="card-detail"><span class="icon">📍</span><span>${c.address}</span></div>` : '';
  const notes = c.notes ? `<div class="card-notes">💬 ${c.notes}</div>` : '';

  return `
    <div class="contact-card">
      <div class="card-actions">
        <button class="btn-icon" onclick="openModal('${escJsArg(c.id)}')" title="Edit">✏️</button>
        <button class="btn-icon del" onclick="askDelete('${escJsArg(c.id)}')" title="Delete">🗑</button>
      </div>
      <div class="card-name">${c.name}</div>
      ${phone}${email}${addr}${notes}
    </div>`;
}

function toggleSection(cat) {
  const id = encodeId(cat);
  const sec  = document.getElementById('sec_' + id);
  const grid = document.getElementById('grid_' + id);
  if (!sec) return;
  sec.classList.toggle('collapsed');
  grid.classList.toggle('hidden');
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function populateCategorySelect(selected) {
  const sel = document.getElementById('f_category');
  const cats = getCategories();
  sel.innerHTML = `<option value="">— Select —</option>` +
    cats.map(c => `<option value="${c}"${c===selected?' selected':''}>${c}</option>`).join('') +
    `<option value="__new__">＋ New category…</option>`;
}

function handleCategoryChange() {
  const val = document.getElementById('f_category').value;
  const row = document.getElementById('newCatRow');
  row.classList.toggle('visible', val === '__new__');
  if (val === '__new__') document.getElementById('f_newcat').focus();
}

function openModal(id) {
  editingId = id != null ? id : null;
  document.getElementById('modalTitle').textContent = id != null ? 'Edit Contact' : 'Add Contact';
  const c = id != null ? contacts.find(x => x.id === id) : null;
  populateCategorySelect(c ? c.category : '');
  document.getElementById('f_name').value    = c ? c.name    : '';
  document.getElementById('f_phone').value   = c ? c.phone   : '';
  document.getElementById('f_email').value   = c ? c.email   : '';
  document.getElementById('f_address').value = c ? c.address : '';
  document.getElementById('f_notes').value   = c ? c.notes   : '';
  document.getElementById('f_newcat').value  = '';
  document.getElementById('newCatRow').classList.remove('visible');
  document.getElementById('btnSave').disabled = false;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('f_name').focus(), 300);
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

async function saveContact() {
  const name = document.getElementById('f_name').value.trim();
  let cat = document.getElementById('f_category').value;
  if (cat === '__new__') cat = document.getElementById('f_newcat').value.trim();

  if (!name) { showToast('Name is required'); return; }
  if (!cat)  { showToast('Category is required'); return; }

  const contact = {
    id: editingId,
    name, category: cat,
    phone:   document.getElementById('f_phone').value.trim(),
    email:   document.getElementById('f_email').value.trim(),
    address: document.getElementById('f_address').value.trim(),
    notes:   document.getElementById('f_notes').value.trim(),
  };

  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  setSyncState('syncing', 'Saving…');

  try {
    if (editingId != null) {
      await apiCall({ action: 'update', contact });
      showToast('Contact updated ✓');
    } else {
      await apiCall({ action: 'add', contact });
      showToast('Contact added ✓');
    }
    closeModal();
    await loadContacts();
  } catch (e) {
    showToast('Save failed — check connection');
    setSyncState('error', 'Error');
    btn.disabled = false;
    btn.textContent = 'Save Contact';
  }
}

// ─── DELETE ──────────────────────────────────────────────────────────────────
function askDelete(id) {
  deletingId = id;
  const c = contacts.find(x => x.id === id);
  document.getElementById('confirmText').textContent = `Remove "${c.name}" from the directory?`;
  document.getElementById('confirmOverlay').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
  deletingId = null;
}

async function confirmDelete() {
  closeConfirm();
  setSyncState('syncing', 'Deleting…');
  try {
    await apiCall({ action: 'delete', id: deletingId });
    showToast('Contact removed');
    await loadContacts();
  } catch (e) {
    showToast('Delete failed — check connection');
    setSyncState('error', 'Error');
  }
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeConfirm(); }
});

// ─── ONLINE/OFFLINE ──────────────────────────────────────────────────────────
window.addEventListener('online',  () => { document.getElementById('offlineBanner').classList.remove('show'); loadContacts(); });
window.addEventListener('offline', () => { document.getElementById('offlineBanner').classList.add('show'); setSyncState('error','Offline'); });

// ─── SERVICE WORKER ──────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(console.error);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
loadContacts();
</script>
</body>
</html>
